<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Colorfly Studio</title>
        
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
  
</head>
<body>
  <header>
    <h1>Genera tu propia paleta de colores</h1>
    <h2>Podras bloquear y copiar el codigo de tus colores en el formato que eligas</h2>

    <select id="formato" onchange="cambiarFormato()">
      <option value="">Selecciona el formato</option>
      <option value="hex">HEX</option>
      <option value="hsl">HSL</option>
    </select>

  <select id="cantidad">
    <option value="">Cantidad de colores</option>
    <option value="6">6 colores</option>
    <option value="8">8 colores</option>
    <option value="9">9 colores</option>
  </select>

    <button onclick="generarPaleta()">Generar Paleta</button>
     
    <div id="paleta"></div>

  </header>
  <footer class="footer">
    <p>Cualquier duda podes consultarnos</p>
    <p>Contacto: info@email.com</p>
    <h3>Estamos para ayudarte</h3>
  </footer>

  <script src="script.js"></script>

</body>

</html>
